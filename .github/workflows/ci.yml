name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 루트 package.json 의 `packageManager: bun@1.3.12` 와 일치시킴 —
# `latest` 사용 시 Bun 업데이트만으로 lockfile 해석 / workspace 동작이 비결정적으로 깨질 수 있음
env:
  BUN_VERSION: "1.3.12"

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1. 변경된 앱 감지 (pullim 패턴 — bun 워크스페이스 정렬)
  # packages/** 또는 root 설정 변경 시 → 양쪽 모두 영향
  # ─────────────────────────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      q: ${{ steps.filter.outputs.q }}
      backend: ${{ steps.filter.outputs.backend }}
      packages: ${{ steps.filter.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
        # main push 이벤트에서도 paths-filter가 이전 커밋과 git diff 계산 가능하도록 전체 이력 fetch
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            q:
              - 'apps/q/**'
              - 'packages/**'
              - 'tsconfig.base.json'
              - 'turbo.json'
              - 'package.json'
              - 'bun.lock'
              - '.github/workflows/**'
            backend:
              - 'apps/backend/**'
              - 'packages/**'
              - 'tsconfig.base.json'
              - 'turbo.json'
              - 'package.json'
              - 'bun.lock'
              - '.github/workflows/**'
            packages:
              - 'packages/**'
              - 'tsconfig.base.json'
              - 'turbo.json'
              - 'package.json'
              - 'bun.lock'
              - '.github/workflows/**'

  # ─────────────────────────────────────────────────────────────
  # Job 2. Lint & Typecheck (영향받은 앱만 / turbo --filter 병렬)
  # ─────────────────────────────────────────────────────────────
  validate:
    name: validate (typecheck + lint)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: >-
      needs.detect-changes.outputs.q == 'true' ||
      needs.detect-changes.outputs.backend == 'true' ||
      needs.detect-changes.outputs.packages == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # packages/** 변경 시 packages 워크스페이스 자체도 typecheck 대상에 추가 —
      # 두 앱이 packages를 아직 직접 참조하지 않아도 packages 내부 타입 오류 검출
      - name: Typecheck (affected)
        run: |
          FILTER=""
          if [ "${{ needs.detect-changes.outputs.q }}" = "true" ]; then
            FILTER="$FILTER --filter=@pullim-q/q"
          fi
          if [ "${{ needs.detect-changes.outputs.backend }}" = "true" ]; then
            FILTER="$FILTER --filter=@pullim-q/backend"
          fi
          if [ "${{ needs.detect-changes.outputs.packages }}" = "true" ]; then
            FILTER="$FILTER --filter=@pullim-q/types --filter=@pullim-q/api-client --filter=@pullim-q/auth"
          fi
          bunx turbo typecheck $FILTER

      - name: Lint (affected)
        # packages는 아직 lint script 없음 — Phase β에서 도입 예정
        if: >-
          needs.detect-changes.outputs.q == 'true' ||
          needs.detect-changes.outputs.backend == 'true'
        run: |
          FILTER=""
          if [ "${{ needs.detect-changes.outputs.q }}" = "true" ]; then
            FILTER="$FILTER --filter=@pullim-q/q"
          fi
          if [ "${{ needs.detect-changes.outputs.backend }}" = "true" ]; then
            FILTER="$FILTER --filter=@pullim-q/backend"
          fi
          bunx turbo lint $FILTER

  # ─────────────────────────────────────────────────────────────
  # Job 3. Build (영향받은 앱만)
  # ─────────────────────────────────────────────────────────────
  build:
    name: build (Next.js + NestJS)
    needs: [detect-changes, validate]
    runs-on: ubuntu-latest
    if: >-
      needs.detect-changes.outputs.q == 'true' ||
      needs.detect-changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Build (affected)
        run: |
          FILTER=""
          if [ "${{ needs.detect-changes.outputs.q }}" = "true" ]; then
            FILTER="$FILTER --filter=@pullim-q/q"
          fi
          if [ "${{ needs.detect-changes.outputs.backend }}" = "true" ]; then
            FILTER="$FILTER --filter=@pullim-q/backend"
          fi
          bunx turbo build $FILTER

  # ─────────────────────────────────────────────────────────────
  # Job 4. Unit test (Jest) — Q 앱 영향 시
  # apps/q/CLAUDE.md 가 작업 규칙으로 mandating — 회귀 방지 위해 CI 에 남김
  # ─────────────────────────────────────────────────────────────
  test:
    name: test (Jest)
    needs: [detect-changes, validate]
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.q == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Unit test
        run: bun --filter @pullim-q/q test

  # ─────────────────────────────────────────────────────────────
  # Job 5. E2E (Playwright) — Q 앱 영향 시
  # apps/q/CLAUDE.md 가 작업 규칙으로 mandating — 라우팅/상호작용 회귀 방지
  # ─────────────────────────────────────────────────────────────
  e2e:
    name: e2e (Playwright)
    needs: [detect-changes, validate]
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.q == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile

      - name: Resolve Playwright version
        id: pw
        working-directory: apps/q
        run: |
          VERSION=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Playwright Chromium + system deps
        working-directory: apps/q
        run: bunx playwright install --with-deps chromium

      - name: Run e2e
        run: bun --filter @pullim-q/q test:e2e

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/q/playwright-report/
            apps/q/test-results/
          retention-days: 7
